<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}?v=20260311-1">
</head>
<body data-page="{{ page_name }}" data-category="{{ category_key | default('') }}">
    <div class="page-bg"></div>
    <header class="site-header">
        <a class="brand" href="/">
            <span class="brand-mark"></span>
            <span>Global Issue Map</span>
        </a>
        <nav class="site-nav">
            {% for item in nav_items %}
            <a href="{{ item.href }}" class="{% if request.url.path == item.href %}active{% endif %}">{{ item.label }}</a>
            {% endfor %}
        </nav>
    </header>

    <main class="page-shell">
        {% if load_error %}
        <section class="notice-banner">{{ load_error }}</section>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script id="page-payload" type="application/json">{{ page_payload | tojson }}</script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', path='js/app.js') }}?v=20260311-3"></script>
</body>
</html>
